<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Ceviches - Estilo Urbano</title>
    <link rel="stylesheet" href="mystyles.css">
    <link rel="icon" href="imag/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <header class="header slide-down">
        <img src="imag/logo.png" alt="Logo" class="main-logo">
        <h1 class="logo"> <span>MENÚ</span></h1>
        <p class="subtitle">EXPERIENCIA URBANA DEL MAR</p>
    </header>

    <main class="container">
        <section class="menu-grid" id="contenedor-menu">
            <p>Cargando experiencia urbana...</p>
        </section>
    </main>

    <footer class="footer fade-in">
        <p>© 2026 Menú Urbano - Diseñado para disfrutar.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
